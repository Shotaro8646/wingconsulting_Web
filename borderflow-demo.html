<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BorderFlow AI v13</title>
<style>
:root{--bg:#f5f6f8;--card:#fff;--bd:#e2e5ea;--tx:#1a1d23;--sub:#6b7280;--ht:#9ca3af;--bl:#1565c0;--blbg:#e8f1fb;--gn:#1D9E75;--gnbg:#e6f7f1;--rd:#c62828;--rdbg:#fce4ec;--am:#d97706;--ambg:#fef3c7;--pu:#7c3aed;--pubg:#ede9fe;--tl:#0e7490;--tlbg:#e0f7fa;--navy:#0C2340;--navyL:#14325A;--lb:#CAEEFB;--lbbg:#e8f6fd;--dn:#162D50}
@media(prefers-color-scheme:dark){:root{--bg:#0f1117;--card:#181b23;--bd:#282d3a;--tx:#e5e7eb;--sub:#9ca3af;--ht:#6b7280;--bl:#60a5fa;--blbg:#1e293b;--gn:#34d399;--gnbg:#162a23;--rd:#f87171;--rdbg:#2d1a1e;--am:#fbbf24;--ambg:#2a2416;--pu:#a78bfa;--pubg:#1f1a2e;--tl:#22d3ee;--tlbg:#0c2a33;--navy:#0a1828;--navyL:#112240;--lb:#CAEEFB;--lbbg:#1a3040;--dn:#8FABC4}}
*{box-sizing:border-box;margin:0;padding:0}body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Kaku Gothic ProN",sans-serif;background:var(--bg);color:var(--tx);line-height:1.5;display:flex;min-height:100vh}
.sidebar{width:220px;background:var(--navy);color:#fff;padding:16px 0;display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:100;overflow-y:auto}
.sb-logo{display:flex;align-items:center;gap:10px;padding:0 16px 20px;border-bottom:1px solid rgba(255,255,255,.1)}.sb-logo .logo{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,#0C2340,#6BB8D9);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;flex-shrink:0}.sb-logo h1{font-size:15px;font-weight:700}.sb-logo p{font-size:9px;opacity:.6;margin:0}
.sb-section{padding:12px 0 4px;margin:0 16px;font-size:9px;text-transform:uppercase;letter-spacing:1px;opacity:.4;font-weight:600}
.sb-item{display:flex;align-items:center;gap:10px;padding:9px 16px;cursor:pointer;font-size:13px;font-weight:500;transition:.12s;border-left:3px solid transparent}.sb-item:hover{background:var(--navyL)}.sb-item.active{background:var(--navyL);border-left-color:var(--lb);font-weight:600}.sb-item .sb-icon{width:20px;text-align:center;font-size:15px;flex-shrink:0}.sb-item .sb-cnt{margin-left:auto;font-size:10px;background:rgba(255,255,255,.15);padding:1px 7px;border-radius:8px}
.sb-divider{height:1px;background:rgba(255,255,255,.08);margin:8px 16px}
.sb-pat{display:flex;align-items:center;gap:8px;padding:6px 16px 6px 24px;cursor:pointer;font-size:11px;opacity:.7;transition:.12s}.sb-pat:hover{opacity:1;background:var(--navyL)}
.main{margin-left:220px;flex:1;padding:24px 28px 60px;max-width:1200px}
.page-title{font-size:18px;font-weight:700;margin-bottom:18px;display:flex;align-items:center;gap:10px}
.chevrons{display:flex;margin-bottom:20px;overflow-x:auto;gap:0}.chev{position:relative;flex:1;min-width:54px;padding:8px 6px 8px 16px;font-size:7px;font-weight:600;line-height:1.2;text-align:center;cursor:pointer;clip-path:polygon(0 0,calc(100% - 10px) 0,100% 50%,calc(100% - 10px) 100%,0 100%,10px 50%);margin-left:-2px;transition:.12s}.chev:first-child{clip-path:polygon(0 0,calc(100% - 10px) 0,100% 50%,calc(100% - 10px) 100%,0 100%);padding-left:10px}.chev b{display:block;font-size:10px}.chev-done{background:var(--lb);color:var(--navy)}.chev-cur{background:var(--navy);color:#fff}.chev-fut{background:#dfe3e8;color:var(--ht)}
@media(prefers-color-scheme:dark){.chev-fut{background:var(--bd)}}
.deal-card{background:var(--card);border:1px solid var(--bd);border-radius:12px;padding:16px 18px;margin-bottom:10px;cursor:pointer;transition:.15s}.deal-card:hover{border-color:var(--bl);box-shadow:0 2px 10px rgba(0,0,0,.05)}
.dbar{display:flex;gap:1px;height:6px;border-radius:3px;overflow:hidden;margin-top:10px}.dbar div{flex:1;border-radius:2px}.brd{background:var(--lb)}.brc{background:var(--navy)}.brf{background:var(--bd)}
.section{background:var(--card);border:1px solid var(--bd);border-radius:11px;margin-bottom:10px;overflow:hidden}.sh{padding:13px 16px;cursor:pointer;display:flex;justify-content:space-between;align-items:center}.sh h3{font-size:13px;font-weight:600}.sb2{border-top:1px solid var(--bd);padding:14px 16px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:4px 16px;font-size:12px}.g2 .k{color:var(--sub)}.g2 .v{font-weight:500}
table{width:100%;border-collapse:collapse;font-size:11px}th{padding:6px 8px;text-align:left;font-size:10px;color:var(--ht);background:var(--bg);border-bottom:1px solid var(--bd);font-weight:600}td{padding:7px 8px;border-bottom:1px solid var(--bd)}
.tag{font-size:9px;padding:2px 7px;border-radius:4px;font-weight:600;white-space:nowrap}.tg{background:var(--gnbg);color:var(--gn)}.tb{background:var(--blbg);color:var(--bl)}.ta{background:var(--ambg);color:var(--am)}.tr{background:var(--rdbg);color:var(--rd)}.tp2{background:var(--pubg);color:var(--pu)}.tt{background:var(--tlbg);color:var(--tl)}
.btn{padding:8px 16px;font-size:12px;font-weight:600;border-radius:8px;border:none;cursor:pointer;display:inline-flex;align-items:center;gap:6px}.bg{background:var(--navy);color:#fff}.bb{background:var(--bl);color:#fff}.bs{background:var(--card);border:1px solid var(--bd);color:var(--sub)}.bpu{background:var(--pu);color:#fff}.sm{padding:5px 10px;font-size:11px;border-radius:6px}
.nt{padding:10px 14px;background:var(--blbg);border-radius:8px;font-size:11px;color:var(--bl);line-height:1.6;margin:0 0 14px}
.bc{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--sub);margin-bottom:16px}.bc a{color:var(--bl);cursor:pointer;text-decoration:none;font-weight:500}
.disc{background:var(--card);border:1px solid var(--bd);border-radius:8px;padding:12px 14px;margin-bottom:8px}.disc.hi{border-left:3px solid var(--rd)}.disc.md{border-left:3px solid var(--am)}.disc.ok{border-left:3px solid var(--gn)}
.vs{display:grid;grid-template-columns:1fr auto 1fr;gap:6px;align-items:center;margin:6px 0}.vb{background:var(--bg);border-radius:5px;padding:5px 8px;font-size:11px}.neq{font-size:14px;color:var(--rd);font-weight:700;text-align:center}
.hs-code{font-family:monospace;font-size:10px;background:var(--blbg);color:var(--bl);padding:2px 5px;border-radius:3px;font-weight:600}
.sub-title{font-size:12px;font-weight:700;color:var(--bl);margin:14px 0 8px;padding-bottom:4px;border-bottom:1px solid var(--bd)}.sub-title:first-child{margin-top:0}
.appr-flow{display:flex;gap:4px;align-items:center;margin:8px 0;flex-wrap:wrap}.appr-step{display:flex;align-items:center;gap:4px;padding:4px 10px;border-radius:6px;font-size:10px;font-weight:600}.appr-step.done{background:var(--lbbg);color:var(--navy)}.appr-step.cur{background:var(--navy);color:#fff}.appr-step.fut{background:var(--bg);color:var(--ht)}.appr-arrow{color:var(--ht);font-size:12px}
.lot-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:8px 0}.lot-card{background:var(--bg);border-radius:8px;padding:10px;font-size:11px}.lot-card b{display:block;font-size:12px;margin-bottom:4px}
.pnl-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:8px 0}.pnl-card{background:var(--bg);border-radius:8px;padding:12px;text-align:center}.pnl-card .num{font-size:20px;font-weight:700}.pnl-card .lbl{font-size:10px;color:var(--sub)}
.dash-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}.dash-card{background:var(--card);border:1px solid var(--bd);border-radius:12px;padding:16px;text-align:center}.dash-card .num{font-size:28px;font-weight:700;color:var(--bl)}.dash-card .lbl{font-size:11px;color:var(--sub);margin-top:2px}
.inv-tbl{background:var(--card);border:1px solid var(--bd);border-radius:12px;overflow:hidden;margin-bottom:16px}.inv-tbl table{margin:0}.inv-tbl th{font-size:11px;padding:10px 12px}.inv-tbl td{font-size:12px;padding:10px 12px}
/* ═ NEW DEAL ENTRY ═ */
.entry-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:20px}
.entry-card{background:var(--card);border:2px solid var(--bd);border-radius:16px;padding:28px 24px;text-align:center;cursor:pointer;transition:.2s}.entry-card:hover{border-color:var(--bl);box-shadow:0 6px 24px rgba(0,0,0,.08)}.entry-card .ec-icon{font-size:40px;margin-bottom:10px}.entry-card h3{font-size:15px;font-weight:700;margin-bottom:6px}.entry-card p{font-size:11px;color:var(--sub);line-height:1.5}
.ocr-zone{border:2px dashed var(--bd);border-radius:12px;padding:24px;text-align:center;margin-bottom:16px;transition:.2s;cursor:pointer}.ocr-zone:hover{border-color:var(--bl);background:var(--blbg)}.ocr-zone.active{border-color:var(--lb);background:var(--lbbg)}
.ocr-log{background:#0f1117;color:#34d399;border-radius:8px;padding:12px 14px;font-family:monospace;font-size:11px;line-height:1.8;margin-top:12px;max-height:200px;overflow-y:auto;text-align:left}
.ai-detect{background:linear-gradient(135deg,var(--blbg),var(--lbbg));border:2px solid var(--lb);border-radius:12px;padding:16px 20px;margin:12px 0;display:flex;align-items:center;gap:14px}.ai-detect .ai-icon{font-size:28px;flex-shrink:0}.ai-detect h4{font-size:13px;font-weight:700;margin-bottom:2px}.ai-detect p{font-size:11px;color:var(--sub)}
.pat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px}.pat{background:var(--card);border:1px solid var(--bd);border-radius:14px;padding:18px;cursor:pointer;transition:.15s;position:relative}.pat:hover{border-color:var(--bl);box-shadow:0 4px 16px rgba(0,0,0,.06)}.pat .p-icon{font-size:24px;margin-bottom:8px}.pat h3{font-size:13px;font-weight:700;margin-bottom:4px}.pat p{font-size:10px;color:var(--sub);line-height:1.5}.pat .p-flow{font-size:9px;color:var(--ht);margin-top:8px}.pat .p-steps{font-size:9px;color:var(--bl);font-weight:600;margin-top:6px}.pat .p-badge{position:absolute;top:10px;right:10px;font-size:8px;padding:2px 6px;border-radius:3px;font-weight:700}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:10px 16px;margin-bottom:12px}.fg{display:flex;flex-direction:column;gap:3px}.fg label{font-size:11px;font-weight:600;color:var(--sub)}.fg input,.fg select{padding:7px 10px;border:1px solid var(--bd);border-radius:6px;font-size:12px;background:var(--card);color:var(--tx);font-family:inherit}.fg input:focus,.fg select:focus{outline:none;border-color:var(--bl)}.fg input.filled{border-color:var(--lb);background:var(--lbbg)}
.voyage-track{background:var(--card);border:1px solid var(--bd);border-radius:12px;padding:16px;margin-bottom:12px}
.voyage-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.voyage-bar{position:relative;height:40px;background:var(--bg);border-radius:20px;overflow:hidden;margin-bottom:8px}
.voyage-fill{height:100%;border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;transition:.3s}
.voyage-ports{display:flex;justify-content:space-between;font-size:10px;color:var(--sub)}
.voyage-ship{position:absolute;top:50%;transform:translateY(-50%);font-size:18px}
.cust-detail{background:var(--card);border:1px solid var(--bd);border-radius:12px;padding:16px;margin-bottom:12px}
.credit-bar{height:24px;background:var(--bg);border-radius:12px;overflow:hidden;display:flex;margin:8px 0}
.credit-bar div{height:100%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff}
.credit-edit{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin:8px 0}
.credit-edit .fg input{padding:6px 8px;font-size:11px}
.split-wrap{display:flex;gap:0;min-height:calc(100vh - 48px)}
.split-left{width:340px;min-width:340px;border-right:1px solid var(--bd);padding-right:16px;overflow-y:auto;max-height:calc(100vh - 48px);position:sticky;top:0}
.split-right{flex:1;padding-left:20px;overflow-y:auto;min-width:0}
.search-box{position:relative;margin-bottom:12px}
.search-box input{width:100%;padding:8px 12px 8px 34px;border:1px solid var(--bd);border-radius:8px;font-size:12px;background:var(--card);color:var(--tx);font-family:inherit}
.search-box input:focus{outline:none;border-color:var(--navy)}
.search-box .s-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:14px;color:var(--ht)}
.deal-mini{background:var(--card);border:1px solid var(--bd);border-radius:10px;padding:10px 12px;margin-bottom:6px;cursor:pointer;transition:.12s}
.deal-mini:hover{border-color:var(--navy)}
.deal-mini.sel{border-color:var(--navy);background:var(--lbbg);border-width:2px}
.deal-mini .dm-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px}
.deal-mini .dm-id{font-size:12px;font-weight:700;color:var(--navy)}
.deal-mini .dm-sup{font-size:11px;font-weight:500;margin-left:6px}
.deal-mini .dm-meta{font-size:10px;color:var(--sub);display:flex;gap:8px;flex-wrap:wrap}
.deal-mini .dm-bar{display:flex;gap:1px;height:4px;border-radius:2px;overflow:hidden;margin-top:5px}
.deal-mini .dm-bar div{flex:1;border-radius:1px}
.empty-detail{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:400px;color:var(--ht);text-align:center}
.empty-detail .ed-icon{font-size:48px;margin-bottom:12px;opacity:.4}
.empty-detail p{font-size:13px}
@media(max-width:1000px){.split-wrap{flex-direction:column}.split-left{width:100%;min-width:0;border-right:none;border-bottom:1px solid var(--bd);padding-right:0;padding-bottom:12px;max-height:320px;position:static}.split-right{padding-left:0;padding-top:16px}}

.tp-im{background:#d0e2f4;color:#1a3a5c}.tp-id{background:#d5f0f0;color:#0e5e6e}.tp-ex{background:#e6ddf7;color:#5b34a0}.tp-b2{background:#fde8c8;color:#8a5a08}.tp-of{background:#d0eceb;color:#0a5c57}.tp-do{background:#dde4ed;color:#334155}.tp-ag{background:#e8eaed;color:#4b5563}
.tpos{border:1.5px solid;background:transparent;font-weight:700}.tpos-l{border-color:var(--navy);color:var(--navy)}.tpos-s{border-color:var(--rd);color:var(--rd)}
.tst-done{background:var(--lbbg);color:#1a3a5c}.tst-cur{background:var(--navy);color:#fff}.tst-pend{background:var(--bg);color:var(--ht)}
.legend-bar{display:flex;gap:6px;align-items:center;flex-wrap:wrap;padding:10px 14px;background:var(--card);border:1px solid var(--bd);border-radius:10px;margin-bottom:14px;font-size:10px;color:var(--sub)}
.legend-bar .lg-title{font-weight:700;color:var(--tx);margin-right:4px}
.legend-bar .lg-sep{width:1px;height:16px;background:var(--bd);margin:0 6px}
.unit-conv{background:var(--card);border:1px solid var(--bd);border-radius:10px;padding:14px;margin:10px 0}
.unit-conv h4{font-size:12px;font-weight:700;margin-bottom:8px;color:var(--navy)}
.uc-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}.uc-row input{width:100px;padding:6px 8px;border:1px solid var(--bd);border-radius:6px;font-size:12px;background:var(--card);color:var(--tx)}.uc-row select{padding:6px 8px;border:1px solid var(--bd);border-radius:6px;font-size:11px;background:var(--card);color:var(--tx)}.uc-row .uc-eq{font-size:14px;font-weight:700;color:var(--navy)}.uc-row .uc-result{font-size:14px;font-weight:700;color:var(--navy);min-width:80px}
.tdb-section{background:var(--card);border:1px solid var(--bd);border-radius:12px;padding:16px;margin-bottom:12px}
.tdb-upload{border:2px dashed var(--bd);border-radius:10px;padding:16px;text-align:center;cursor:pointer;transition:.2s;margin:10px 0}.tdb-upload:hover{border-color:var(--navy);background:var(--lbbg)}
.tdb-result{background:var(--lbbg);border:1px solid var(--lb);border-radius:10px;padding:14px;margin:10px 0}
.tdb-rating{display:flex;gap:16px;margin:8px 0;flex-wrap:wrap}.tdb-rating .tdb-score{text-align:center;padding:10px 16px;background:var(--bg);border-radius:8px;min-width:80px}.tdb-rating .tdb-score .num{font-size:22px;font-weight:700;color:var(--navy)}.tdb-rating .tdb-score .lbl{font-size:9px;color:var(--sub)}
.dup-card{background:var(--card);border:1px solid var(--bd);border-radius:10px;padding:12px 14px;margin-bottom:8px;cursor:pointer;transition:.15s;display:flex;justify-content:space-between;align-items:center}.dup-card:hover{border-color:var(--navy);box-shadow:0 2px 8px rgba(0,0,0,.05)}
.chart-wrap{background:var(--card);border:1px solid var(--bd);border-radius:12px;padding:16px 16px 12px;margin-bottom:16px}
.chart-wrap h4{font-size:13px;font-weight:700;margin-bottom:12px}
.chart-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.chart-legend{display:flex;gap:16px;margin-top:8px;font-size:10px;color:var(--sub)}.chart-legend span{display:flex;align-items:center;gap:4px}.chart-legend i{width:10px;height:3px;border-radius:2px;display:inline-block}

.dc-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;flex-wrap:wrap;gap:10px}
.dc-header h2{font-size:18px;font-weight:700;display:flex;align-items:center;gap:8px}
.dc-upload-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:20px}
.dc-drop{border:2px dashed var(--bd);border-radius:12px;padding:20px 14px;text-align:center;cursor:pointer;transition:.2s;min-height:120px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px}
.dc-drop:hover{border-color:var(--bl);background:var(--blbg)}
.dc-drop.loaded{border-color:var(--gn);border-style:solid;background:var(--gnbg)}
.dc-drop .dc-icon{font-size:28px;margin-bottom:4px}
.dc-drop .dc-label{font-size:12px;font-weight:600;color:var(--tx)}
.dc-drop .dc-sub{font-size:10px;color:var(--ht)}
.dc-drop .dc-file{font-size:10px;color:var(--gn);font-weight:600;margin-top:4px}
.dc-result{background:var(--card);border:1px solid var(--bd);border-radius:12px;padding:18px;margin-bottom:16px}
.dc-result h3{font-size:14px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.dc-tbl{width:100%;border-collapse:collapse;font-size:11px;margin-bottom:8px}
.dc-tbl th{background:var(--bg);font-weight:600;padding:8px 10px;text-align:left;border-bottom:2px solid var(--bd);font-size:10px;color:var(--sub);text-transform:uppercase}
.dc-tbl td{padding:8px 10px;border-bottom:1px solid var(--bd);vertical-align:top}
.dc-tbl tr:hover{background:var(--blbg)}
.dc-status{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600}
.dc-ok{background:var(--gnbg);color:var(--gn)}.dc-warn{background:var(--ambg);color:var(--am)}.dc-err{background:var(--rdbg);color:var(--rd)}
.dc-summary{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}
.dc-scard{background:var(--card);border:1px solid var(--bd);border-radius:10px;padding:14px;text-align:center}
.dc-scard .dc-snum{font-size:22px;font-weight:700}.dc-scard .dc-slbl{font-size:10px;color:var(--sub);margin-top:2px}
.dc-hs{background:var(--card);border:1px solid var(--bd);border-radius:12px;padding:18px;margin-bottom:16px}
.dc-hs h3{font-size:14px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.dc-hs-item{display:flex;justify-content:space-between;align-items:flex-start;padding:12px;border:1px solid var(--bd);border-radius:10px;margin-bottom:8px;gap:12px}
.dc-hs-item:hover{background:var(--blbg)}
.dc-hs-code{font-size:16px;font-weight:700;color:var(--navy);font-family:monospace;white-space:nowrap}
.dc-hs-desc{font-size:11px;color:var(--sub)}
.dc-hs-conf{font-size:10px;font-weight:600;padding:3px 8px;border-radius:8px}
.dc-conf-h{background:var(--gnbg);color:var(--gn)}.dc-conf-m{background:var(--ambg);color:var(--am)}.dc-conf-l{background:var(--rdbg);color:var(--rd)}
.dc-log{background:var(--card);border:1px solid var(--bd);border-radius:12px;padding:18px;margin-bottom:16px}
.dc-log h3{font-size:14px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.dc-log-item{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid var(--bd);font-size:11px;align-items:flex-start}
.dc-log-time{color:var(--ht);white-space:nowrap;font-family:monospace;min-width:60px}
